# Builds and publishes ClipNinja on every version tag push.
#
# Release flow (see RELEASING.md):
#   1. Bump <Version> in ClipNinjaV2.csproj and the header text in
#      MainWindow.xaml, commit.
#   2. git tag v2.7.0 && git push --tags
#   3. This workflow publishes the self-contained single-file exe,
#      zips it, and attaches it to a GitHub Release for that tag.
#   4. Running ClipNinja installs see the new release via the in-app
#      updater (Settings → Updates, or the startup check).
#
# The in-app updater downloads the .zip asset, extracts the exe, and
# swaps itself. Keep the asset a PUBLISHED build — never a source zip.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the release + upload assets

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        shell: pwsh
        run: |
          # Locate the project wherever it lives in the repo layout —
          # root or a ClipNinjaV2/ subfolder both work.
          $proj = Get-ChildItem -Recurse -Filter ClipNinjaV2.csproj | Select-Object -First 1
          dotnet publish $proj.FullName -c Release -o publish_out
        # PublishSingleFile / SelfContained / win-x64 all come from the
        # csproj, so local VS publishes and CI publishes are identical.

      - name: Zip the exe
        shell: pwsh
        run: |
          Compress-Archive -Path publish_out/*.exe -DestinationPath ClipNinja-win-x64.zip

      - name: Create GitHub Release with asset
        uses: softprops/action-gh-release@v2
        with:
          files: ClipNinja-win-x64.zip
          generate_release_notes: true
